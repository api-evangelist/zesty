specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Zesty
providerId: zesty
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CMS
  - Composable
  - Headless
  - Rate Limiting
description: |
  Zesty.io publishes monthly bundled API-call quotas per plan (Free 3,000 / Start Up
  10,000 / Business 50,000 / Enterprise custom) but does not publish a per-second or
  per-minute throttling number on its public docs. Limits below capture the published
  monthly quotas; per-second behavior is treated as undocumented.
sources:
  - https://www.zesty.io/pricing/
responseCodes:
  throttled: 429
limits:
  - name: Free Community monthly API quota
    scope: account
    metric: requests_per_month
    limit: 3000
    timeFrame: month
  - name: Start Up monthly API quota
    scope: account
    metric: requests_per_month
    limit: 10000
    timeFrame: month
  - name: Business monthly API quota
    scope: account
    metric: requests_per_month
    limit: 50000
    timeFrame: month
  - name: Enterprise monthly API quota
    scope: account
    metric: requests_per_month
    limit: see Zesty enterprise contract
  - name: Per-second throttling
    scope: account
    metric: varies
    limit: not publicly documented
    notes: Zesty's public docs do not publish per-second / per-minute API limits
      separately from the plan's monthly cap.
policies:
  - name: Plan-tier monthly quota
    description: API calls are bundled into the chosen plan's monthly cap; exceeding
      the bundled cap requires upgrading the plan.
  - name: Backoff
    description: Clients should implement exponential backoff with jitter on 429 / 5xx
      responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
