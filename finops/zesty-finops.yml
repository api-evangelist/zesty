specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Zesty
providerId: zesty
publisherName: Zesty, Inc.
serviceCategory: Headless CMS
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - CMS
  - Composable
  - Headless
  - FinOps
  - FOCUS
description: |
  FOCUS-aligned FinOps view for Zesty.io: a tiered monthly subscription that bundles
  CDN bandwidth, CDN requests, API calls, storage, and users, with per-user add-ons
  on the Free tier and custom commitments at Enterprise.
sources:
  - https://www.zesty.io/pricing/
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: Zesty.io
  ServiceCategory: Headless CMS
  ProviderName: Zesty
  PublisherName: Zesty, Inc.
  InvoiceIssuerName: Zesty, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: plan_subscription
    description: Monthly plan subscription (Free / Start Up / Business / Enterprise);
      the primary Zesty billing line.
    unit: month
    aggregation: max
    dimensions:
      - plan_tier
  - name: additional_users
    description: Add-on users beyond the plan's bundled allowance (e.g. $9/user/month
      on the Free Community plan).
    unit: seat-month
    aggregation: count
    dimensions:
      - plan_tier
  - name: cdn_bandwidth
    description: CDN bandwidth consumed against the plan's bundled GB / TB allowance.
    unit: GB
    aggregation: sum
  - name: cdn_requests
    description: CDN requests served against the plan's bundled monthly allowance.
    unit: request
    aggregation: sum
  - name: api_calls
    description: Headless API calls served against the plan's bundled monthly allowance
      (3K / 10K / 50K / custom).
    unit: request
    aggregation: sum
  - name: storage
    description: Stored content / asset volume against the plan's bundled allowance.
    unit: GB
    aggregation: max
principles:
  - name: Visibility
    description: Use the Zesty Manager dashboards for plan utilization (CDN bandwidth,
      CDN requests, API calls, storage) and confirm bundled quotas against the plan
      tier each billing cycle.
  - name: Allocation
    description: Allocate Zesty cost by site / instance and per-user seats; tag enterprise
      contracts to the owning brand or product line.
  - name: Optimization
    description: Optimize via CDN caching policies (raise hit rate to reduce origin
      requests), pruning unused users, and right-sizing the plan tier rather than
      paying per-user add-ons on the Free tier.
  - name: Accountability
    description: Spend ownership sits with the digital / web team that operates the
      Zesty instance; renewal review is monthly for Start Up / Business and at contract
      term for Enterprise.
maintainers:
