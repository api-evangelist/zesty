naftiko: 1.0.0-alpha2
info:
  label: Zesty Media API — Groups
  description: 'Zesty Media API — Groups. 5 operations. Lead operation: Zesty List all media groups. Self-contained Naftiko
    capability covering one Zesty business surface.'
  tags:
  - Zesty
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: media-groups
    baseUri: https://media-manager.api.zesty.io
    description: Zesty Media API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: getgroups
        method: GET
        description: Zesty List all media groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: binZUID
          in: query
          type: string
          description: Filter groups by bin ZUID.
      - name: creategroup
        method: POST
        description: Zesty Create a media group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-groupZUID
      path: /groups/{groupZUID}
      operations:
      - name: getgroup
        method: GET
        description: Zesty Get a media group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupZUID
          in: path
          type: string
          description: The ZUID of the group.
          required: true
      - name: updategroup
        method: PUT
        description: Zesty Update a media group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupZUID
          in: path
          type: string
          description: The ZUID of the group.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletegroup
        method: DELETE
        description: Zesty Delete a media group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupZUID
          in: path
          type: string
          description: The ZUID of the group.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: media-groups-rest
    port: 8080
    description: REST adapter for Zesty Media API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: getgroups
        description: Zesty List all media groups
        call: media-groups.getgroups
        with:
          binZUID: rest.binZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Zesty Create a media group
        call: media-groups.creategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{groupzuid}
      name: groups-groupzuid
      description: REST surface for groups-groupZUID.
      operations:
      - method: GET
        name: getgroup
        description: Zesty Get a media group
        call: media-groups.getgroup
        with:
          groupZUID: rest.groupZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updategroup
        description: Zesty Update a media group
        call: media-groups.updategroup
        with:
          groupZUID: rest.groupZUID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletegroup
        description: Zesty Delete a media group
        call: media-groups.deletegroup
        with:
          groupZUID: rest.groupZUID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: media-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Media API — Groups. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zesty-list-all-media-groups
      description: Zesty List all media groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: media-groups.getgroups
      with:
        binZUID: tools.binZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-create-media-group
      description: Zesty Create a media group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: media-groups.creategroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-media-group
      description: Zesty Get a media group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: media-groups.getgroup
      with:
        groupZUID: tools.groupZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-update-media-group
      description: Zesty Update a media group
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: media-groups.updategroup
      with:
        groupZUID: tools.groupZUID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-delete-media-group
      description: Zesty Delete a media group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: media-groups.deletegroup
      with:
        groupZUID: tools.groupZUID
      outputParameters:
      - type: object
        mapping: $.
