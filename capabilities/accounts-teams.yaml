naftiko: 1.0.0-alpha2
info:
  label: Zesty Accounts API — Teams
  description: 'Zesty Accounts API — Teams. 5 operations. Lead operation: Zesty List all teams. Self-contained Naftiko capability
    covering one Zesty business surface.'
  tags:
  - Zesty
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-teams
    baseUri: https://accounts.api.zesty.io/v1
    description: Zesty Accounts API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams
      path: /teams
      operations:
      - name: getteams
        method: GET
        description: Zesty List all teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createteam
        method: POST
        description: Zesty Create a new team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: teams-teamZUID
      path: /teams/{teamZUID}
      operations:
      - name: getteam
        method: GET
        description: Zesty Get a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamZUID
          in: path
          type: string
          description: The ZUID of the team.
          required: true
      - name: updateteam
        method: PUT
        description: Zesty Update a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamZUID
          in: path
          type: string
          description: The ZUID of the team.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteteam
        method: DELETE
        description: Zesty Delete a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamZUID
          in: path
          type: string
          description: The ZUID of the team.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounts-teams-rest
    port: 8080
    description: REST adapter for Zesty Accounts API — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams
      name: teams
      description: REST surface for teams.
      operations:
      - method: GET
        name: getteams
        description: Zesty List all teams
        call: accounts-teams.getteams
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createteam
        description: Zesty Create a new team
        call: accounts-teams.createteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/{teamzuid}
      name: teams-teamzuid
      description: REST surface for teams-teamZUID.
      operations:
      - method: GET
        name: getteam
        description: Zesty Get a team
        call: accounts-teams.getteam
        with:
          teamZUID: rest.teamZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateteam
        description: Zesty Update a team
        call: accounts-teams.updateteam
        with:
          teamZUID: rest.teamZUID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteteam
        description: Zesty Delete a team
        call: accounts-teams.deleteteam
        with:
          teamZUID: rest.teamZUID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Accounts API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zesty-list-all-teams
      description: Zesty List all teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-teams.getteams
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-create-new-team
      description: Zesty Create a new team
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-teams.createteam
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-team
      description: Zesty Get a team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-teams.getteam
      with:
        teamZUID: tools.teamZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-update-team
      description: Zesty Update a team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounts-teams.updateteam
      with:
        teamZUID: tools.teamZUID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-delete-team
      description: Zesty Delete a team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounts-teams.deleteteam
      with:
        teamZUID: tools.teamZUID
      outputParameters:
      - type: object
        mapping: $.
