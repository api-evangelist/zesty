      in: header
      name: Authorization
      value: '{{ZESTY_TOKEN}}'
    resources:
    - name: instances
      path: /instances
      operations:
      - name: getinstances
        method: GET
        description: Zesty List all instances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
