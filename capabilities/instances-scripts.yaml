naftiko: 1.0.0-alpha2
info:
  label: Zesty Instances API — Scripts
  description: 'Zesty Instances API — Scripts. 4 operations. Lead operation: Zesty List all scripts. Self-contained Naftiko
    capability covering one Zesty business surface.'
  tags:
  - Zesty
  - Scripts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: instances-scripts
    baseUri: https://{instanceZUID}.api.zesty.io/v1
    description: Zesty Instances API — Scripts business capability. Self-contained, no shared references.
    resources:
    - name: web-scripts
      path: /web/scripts
      operations:
      - name: getscripts
        method: GET
        description: Zesty List all scripts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createscript
        method: POST
        description: Zesty Create a script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: web-scripts-scriptZUID
      path: /web/scripts/{scriptZUID}
      operations:
      - name: getscript
        method: GET
        description: Zesty Get a script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: scriptZUID
          in: path
          type: string
          description: The ZUID of the script.
          required: true
      - name: updatescript
        method: PUT
        description: Zesty Update a script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: scriptZUID
          in: path
          type: string
          description: The ZUID of the script.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: instances-scripts-rest
    port: 8080
    description: REST adapter for Zesty Instances API — Scripts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/web/scripts
      name: web-scripts
      description: REST surface for web-scripts.
      operations:
      - method: GET
        name: getscripts
        description: Zesty List all scripts
        call: instances-scripts.getscripts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createscript
        description: Zesty Create a script
        call: instances-scripts.createscript
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/web/scripts/{scriptzuid}
      name: web-scripts-scriptzuid
      description: REST surface for web-scripts-scriptZUID.
      operations:
      - method: GET
        name: getscript
        description: Zesty Get a script
        call: instances-scripts.getscript
        with:
          scriptZUID: rest.scriptZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatescript
        description: Zesty Update a script
        call: instances-scripts.updatescript
        with:
          scriptZUID: rest.scriptZUID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: instances-scripts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Instances API — Scripts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: zesty-list-all-scripts
      description: Zesty List all scripts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: instances-scripts.getscripts
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-create-script
      description: Zesty Create a script
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: instances-scripts.createscript
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-script
      description: Zesty Get a script
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: instances-scripts.getscript
      with:
        scriptZUID: tools.scriptZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-update-script
      description: Zesty Update a script
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: instances-scripts.updatescript
      with:
        scriptZUID: tools.scriptZUID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
