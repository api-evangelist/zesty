naftiko: 1.0.0-alpha2
info:
  label: Zesty Instances API — Search
  description: 'Zesty Instances API — Search. 1 operations. Lead operation: Zesty Search content items. Self-contained Naftiko
    capability covering one Zesty business surface.'
  tags:
  - Zesty
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: instances-search
    baseUri: https://{instanceZUID}.api.zesty.io/v1
    description: Zesty Instances API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search-items
      path: /search/items
      operations:
      - name: searchitems
        method: GET
        description: Zesty Search content items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The search query string.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: instances-search-rest
    port: 8080
    description: REST adapter for Zesty Instances API — Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search/items
      name: search-items
      description: REST surface for search-items.
      operations:
      - method: GET
        name: searchitems
        description: Zesty Search content items
        call: instances-search.searchitems
        with:
          q: rest.q
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: instances-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Instances API — Search. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: zesty-search-content-items
      description: Zesty Search content items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: instances-search.searchitems
      with:
        q: tools.q
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
