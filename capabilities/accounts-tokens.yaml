naftiko: 1.0.0-alpha2
info:
  label: Zesty Accounts API — Tokens
  description: 'Zesty Accounts API — Tokens. 4 operations. Lead operation: Zesty List all access tokens. Self-contained Naftiko
    capability covering one Zesty business surface.'
  tags:
  - Zesty
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-tokens
    baseUri: https://accounts.api.zesty.io/v1
    description: Zesty Accounts API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: tokens
      path: /tokens
      operations:
      - name: gettokens
        method: GET
        description: Zesty List all access tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtoken
        method: POST
        description: Zesty Create an access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tokens-tokenZUID
      path: /tokens/{tokenZUID}
      operations:
      - name: gettoken
        method: GET
        description: Zesty Get an access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tokenZUID
          in: path
          type: string
          description: The ZUID of the token.
          required: true
      - name: deletetoken
        method: DELETE
        description: Zesty Delete an access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tokenZUID
          in: path
          type: string
          description: The ZUID of the token.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounts-tokens-rest
    port: 8080
    description: REST adapter for Zesty Accounts API — Tokens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tokens
      name: tokens
      description: REST surface for tokens.
      operations:
      - method: GET
        name: gettokens
        description: Zesty List all access tokens
        call: accounts-tokens.gettokens
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtoken
        description: Zesty Create an access token
        call: accounts-tokens.createtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tokens/{tokenzuid}
      name: tokens-tokenzuid
      description: REST surface for tokens-tokenZUID.
      operations:
      - method: GET
        name: gettoken
        description: Zesty Get an access token
        call: accounts-tokens.gettoken
        with:
          tokenZUID: rest.tokenZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetoken
        description: Zesty Delete an access token
        call: accounts-tokens.deletetoken
        with:
          tokenZUID: rest.tokenZUID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Accounts API — Tokens. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: zesty-list-all-access-tokens
      description: Zesty List all access tokens
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-tokens.gettokens
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-create-access-token
      description: Zesty Create an access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-tokens.createtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-access-token
      description: Zesty Get an access token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-tokens.gettoken
      with:
        tokenZUID: tools.tokenZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-delete-access-token
      description: Zesty Delete an access token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounts-tokens.deletetoken
      with:
        tokenZUID: tools.tokenZUID
      outputParameters:
      - type: object
        mapping: $.
