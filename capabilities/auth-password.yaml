naftiko: 1.0.0-alpha2
info:
  label: Zesty Auth API — Password
  description: 'Zesty Auth API — Password. 2 operations. Lead operation: Zesty Request a password reset. Self-contained Naftiko
    capability covering one Zesty business surface.'
  tags:
  - Zesty
  - Password
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: auth-password
    baseUri: https://auth.api.zesty.io
    description: Zesty Auth API — Password business capability. Self-contained, no shared references.
    resources:
    - name: password-request
      path: /password/request
      operations:
      - name: requestpasswordreset
        method: POST
        description: Zesty Request a password reset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: password-reset
      path: /password/reset
      operations:
      - name: resetpassword
        method: POST
        description: Zesty Reset a user password
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: auth-password-rest
    port: 8080
    description: REST adapter for Zesty Auth API — Password. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/password/request
      name: password-request
      description: REST surface for password-request.
      operations:
      - method: POST
        name: requestpasswordreset
        description: Zesty Request a password reset
        call: auth-password.requestpasswordreset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/password/reset
      name: password-reset
      description: REST surface for password-reset.
      operations:
      - method: POST
        name: resetpassword
        description: Zesty Reset a user password
        call: auth-password.resetpassword
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auth-password-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Auth API — Password. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zesty-request-password-reset
      description: Zesty Request a password reset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: auth-password.requestpasswordreset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-reset-user-password
      description: Zesty Reset a user password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: auth-password.resetpassword
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
