naftiko: 1.0.0-alpha2
info:
  label: Zesty Accounts API — Users
  description: 'Zesty Accounts API — Users. 4 operations. Lead operation: Zesty List all users. Self-contained Naftiko capability
    covering one Zesty business surface.'
  tags:
  - Zesty
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-users
    baseUri: https://accounts.api.zesty.io/v1
    description: Zesty Accounts API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: getusers
        method: GET
        description: Zesty List all users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userZUID
      path: /users/{userZUID}
      operations:
      - name: getuser
        method: GET
        description: Zesty Get a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userZUID
          in: path
          type: string
          description: The ZUID of the user.
          required: true
      - name: updateuser
        method: PUT
        description: Zesty Update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userZUID
          in: path
          type: string
          description: The ZUID of the user.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Zesty Delete a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userZUID
          in: path
          type: string
          description: The ZUID of the user.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounts-users-rest
    port: 8080
    description: REST adapter for Zesty Accounts API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: getusers
        description: Zesty List all users
        call: accounts-users.getusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userzuid}
      name: users-userzuid
      description: REST surface for users-userZUID.
      operations:
      - method: GET
        name: getuser
        description: Zesty Get a user
        call: accounts-users.getuser
        with:
          userZUID: rest.userZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateuser
        description: Zesty Update a user
        call: accounts-users.updateuser
        with:
          userZUID: rest.userZUID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Zesty Delete a user
        call: accounts-users.deleteuser
        with:
          userZUID: rest.userZUID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Accounts API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zesty-list-all-users
      description: Zesty List all users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-users.getusers
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-user
      description: Zesty Get a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-users.getuser
      with:
        userZUID: tools.userZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-update-user
      description: Zesty Update a user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounts-users.updateuser
      with:
        userZUID: tools.userZUID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-delete-user
      description: Zesty Delete a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounts-users.deleteuser
      with:
        userZUID: tools.userZUID
      outputParameters:
      - type: object
        mapping: $.
