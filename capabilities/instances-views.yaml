naftiko: 1.0.0-alpha2
info:
  label: Zesty Instances API — Views
  description: 'Zesty Instances API — Views. 4 operations. Lead operation: Zesty List all views. Self-contained Naftiko capability
    covering one Zesty business surface.'
  tags:
  - Zesty
  - Views
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: instances-views
    baseUri: https://{instanceZUID}.api.zesty.io/v1
    description: Zesty Instances API — Views business capability. Self-contained, no shared references.
    resources:
    - name: web-views
      path: /web/views
      operations:
      - name: getviews
        method: GET
        description: Zesty List all views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createview
        method: POST
        description: Zesty Create a view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: web-views-viewZUID
      path: /web/views/{viewZUID}
      operations:
      - name: getview
        method: GET
        description: Zesty Get a view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: viewZUID
          in: path
          type: string
          description: The ZUID of the view.
          required: true
      - name: updateview
        method: PUT
        description: Zesty Update a view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: viewZUID
          in: path
          type: string
          description: The ZUID of the view.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: instances-views-rest
    port: 8080
    description: REST adapter for Zesty Instances API — Views. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/web/views
      name: web-views
      description: REST surface for web-views.
      operations:
      - method: GET
        name: getviews
        description: Zesty List all views
        call: instances-views.getviews
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createview
        description: Zesty Create a view
        call: instances-views.createview
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/web/views/{viewzuid}
      name: web-views-viewzuid
      description: REST surface for web-views-viewZUID.
      operations:
      - method: GET
        name: getview
        description: Zesty Get a view
        call: instances-views.getview
        with:
          viewZUID: rest.viewZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateview
        description: Zesty Update a view
        call: instances-views.updateview
        with:
          viewZUID: rest.viewZUID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: instances-views-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Instances API — Views. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: zesty-list-all-views
      description: Zesty List all views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: instances-views.getviews
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-create-view
      description: Zesty Create a view
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: instances-views.createview
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-view
      description: Zesty Get a view
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: instances-views.getview
      with:
        viewZUID: tools.viewZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-update-view
      description: Zesty Update a view
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: instances-views.updateview
      with:
        viewZUID: tools.viewZUID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
