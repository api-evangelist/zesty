naftiko: 1.0.0-alpha2
info:
  label: Zesty Media API — Bins
  description: 'Zesty Media API — Bins. 5 operations. Lead operation: Zesty List all media bins. Self-contained Naftiko capability
    covering one Zesty business surface.'
  tags:
  - Zesty
  - Bins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: media-bins
    baseUri: https://media-manager.api.zesty.io
    description: Zesty Media API — Bins business capability. Self-contained, no shared references.
    resources:
    - name: bins
      path: /bins
      operations:
      - name: getbins
        method: GET
        description: Zesty List all media bins
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createbin
        method: POST
        description: Zesty Create a media bin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: bins-binZUID
      path: /bins/{binZUID}
      operations:
      - name: getbin
        method: GET
        description: Zesty Get a media bin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: binZUID
          in: path
          type: string
          description: The ZUID of the media bin.
          required: true
      - name: updatebin
        method: PUT
        description: Zesty Update a media bin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: binZUID
          in: path
          type: string
          description: The ZUID of the media bin.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebin
        method: DELETE
        description: Zesty Delete a media bin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: binZUID
          in: path
          type: string
          description: The ZUID of the media bin.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: media-bins-rest
    port: 8080
    description: REST adapter for Zesty Media API — Bins. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bins
      name: bins
      description: REST surface for bins.
      operations:
      - method: GET
        name: getbins
        description: Zesty List all media bins
        call: media-bins.getbins
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbin
        description: Zesty Create a media bin
        call: media-bins.createbin
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bins/{binzuid}
      name: bins-binzuid
      description: REST surface for bins-binZUID.
      operations:
      - method: GET
        name: getbin
        description: Zesty Get a media bin
        call: media-bins.getbin
        with:
          binZUID: rest.binZUID
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatebin
        description: Zesty Update a media bin
        call: media-bins.updatebin
        with:
          binZUID: rest.binZUID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletebin
        description: Zesty Delete a media bin
        call: media-bins.deletebin
        with:
          binZUID: rest.binZUID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: media-bins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Media API — Bins. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zesty-list-all-media-bins
      description: Zesty List all media bins
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: media-bins.getbins
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-create-media-bin
      description: Zesty Create a media bin
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: media-bins.createbin
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-get-media-bin
      description: Zesty Get a media bin
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: media-bins.getbin
      with:
        binZUID: tools.binZUID
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-update-media-bin
      description: Zesty Update a media bin
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: media-bins.updatebin
      with:
        binZUID: tools.binZUID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zesty-delete-media-bin
      description: Zesty Delete a media bin
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: media-bins.deletebin
      with:
        binZUID: tools.binZUID
      outputParameters:
      - type: object
        mapping: $.
