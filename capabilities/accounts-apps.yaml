naftiko: 1.0.0-alpha2
info:
  label: Zesty Accounts API — Apps
  description: 'Zesty Accounts API — Apps. 1 operations. Lead operation: Zesty List all apps. Self-contained Naftiko capability
    covering one Zesty business surface.'
  tags:
  - Zesty
  - Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTY_API_KEY: ZESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-apps
    baseUri: https://accounts.api.zesty.io/v1
    description: Zesty Accounts API — Apps business capability. Self-contained, no shared references.
    resources:
    - name: apps
      path: /apps
      operations:
      - name: getapps
        method: GET
        description: Zesty List all apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZESTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounts-apps-rest
    port: 8080
    description: REST adapter for Zesty Accounts API — Apps. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/apps
      name: apps
      description: REST surface for apps.
      operations:
      - method: GET
        name: getapps
        description: Zesty List all apps
        call: accounts-apps.getapps
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zesty Accounts API — Apps. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zesty-list-all-apps
      description: Zesty List all apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-apps.getapps
      outputParameters:
      - type: object
        mapping: $.
