aid: zesty
url: https://raw.githubusercontent.com/api-evangelist/zesty/refs/heads/main/apis.yml
name: Zesty
description: Zesty.io is a composable, data-driven, headless CMS platform that provides REST APIs for authentication, account
  management, instance content management, and media file management. All resources are identified by ZUIDs (Zesty Universal
  Identifiers). The platform supports WebEngine for traditional CMS, headless API architecture, GraphQL, and JamStack implementations.
  Built on Google Cloud Platform with Fastly edge caching.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- CMS
- Composable
- Content Management
- GraphQL
- Headless CMS
- Media
created: '2025-02-17'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
- aid: zesty:auth-api
  name: Zesty Auth API
  tags:
  - Authentication
  - Sessions
  - Tokens
  humanURL: https://docs.zesty.io/docs/auth-api
  properties:
  - url: https://docs.zesty.io/docs/auth-api
    type: Documentation
  - url: openapi/zesty-auth-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/auth-authentication.yaml
  - type: NaftikoCapability
    url: capabilities/auth-password.yaml
  description: The Zesty.io Auth API is used to authenticate users with the platform. It returns a session token that grants
    access to the Instances API, Accounts API, and Media API. User authentication is done by providing an email and password
    combination, which issues a short-lived 30-minute session token. Also supports Microsoft SSO, Okta SSO, and Azure SSO.
