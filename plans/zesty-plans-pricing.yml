    name: Free Community
    type: freemium
    description: Free tier for evaluation and small projects; no credit card required.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
