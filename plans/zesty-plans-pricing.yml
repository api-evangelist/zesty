specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Zesty
providerId: zesty
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - CMS
  - Composable
  - Headless
  - Content
  - Developer Tools
description: |
  Zesty.io is a headless CMS billed as tiered subscription plans that bundle CDN
  bandwidth, CDN requests, API calls, storage, users, languages, and SLA targets.
  All API access is included with the chosen plan; usage above the bundled API call
  cap is governed by plan tier rather than published per-call overage prices.
sources:
  - https://www.zesty.io/pricing/
plans:
